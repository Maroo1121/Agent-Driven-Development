<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#0f172a" rx="12"/>

  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f8fafc" text-anchor="middle">The ADD Cycle</text>

  <!-- Phase boxes - vertical flow -->
  <rect x="310" y="60" width="180" height="44" rx="8" fill="#3b82f6"/>
  <text x="400" y="82" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">1. SCOPE</text>
  <text x="400" y="96" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Define intent &amp; boundaries</text>

  <rect x="310" y="118" width="180" height="44" rx="8" fill="#8b5cf6"/>
  <text x="400" y="140" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">2. FRAME</text>
  <text x="400" y="154" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Package context &amp; knowledge</text>

  <rect x="310" y="176" width="180" height="44" rx="8" fill="#f59e0b"/>
  <text x="400" y="198" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">3. CONSTRAIN</text>
  <text x="400" y="212" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Encode rules &amp; criteria</text>

  <rect x="310" y="234" width="180" height="44" rx="8" fill="#ef4444"/>
  <text x="400" y="256" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">4. EXECUTE</text>
  <text x="400" y="270" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Agent performs the task</text>

  <rect x="310" y="292" width="180" height="44" rx="8" fill="#14b8a6"/>
  <text x="400" y="314" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">5. VERIFY</text>
  <text x="400" y="328" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Validate against constraints</text>

  <!-- PASS path -->
  <line x1="490" y1="314" x2="540" y2="314" stroke="#10b981" stroke-width="2"/>
  <polygon points="537,310 545,314 537,318" fill="#10b981"/>
  <text x="515" y="306" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10b981" text-anchor="middle">PASS</text>

  <rect x="545" y="292" width="180" height="44" rx="8" fill="#10b981"/>
  <text x="635" y="314" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">6. CONSOLIDATE</text>
  <text x="635" y="328" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Commit, log &amp; learn</text>

  <!-- FAIL path -->
  <line x1="310" y1="314" x2="260" y2="314" stroke="#ef4444" stroke-width="2"/>
  <text x="285" y="306" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">FAIL</text>

  <!-- Failure Review box -->
  <rect x="100" y="294" width="160" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="180" y="318" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">Failure Review</text>

  <!-- Loop back line -->
  <line x1="180" y1="294" x2="180" y2="82" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="180" y1="82" x2="310" y2="82" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="180" y="190" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" transform="rotate(-90, 168, 190)">Re-enter at failed phase</text>

  <!-- Arrows between phases -->
  <line x1="400" y1="104" x2="400" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="162" x2="400" y2="176" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="220" x2="400" y2="234" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="278" x2="400" y2="292" stroke="#475569" stroke-width="1.5"/>

  <!-- Artifacts labels on right side -->
  <text x="520" y="82" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">→ Agent Brief</text>
  <text x="520" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">→ Context Pack</text>
  <text x="520" y="198" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">→ Constraint Sheet</text>
  <text x="520" y="256" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">→ Execution Log</text>
  <text x="520" y="348" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">→ Validation Checklist</text>

  <!-- Bottom tagline -->
  <text x="400" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">One task. One cycle. Every time.</text>

  <!-- Legend -->
  <rect x="240" y="440" width="12" height="12" rx="2" fill="#475569"/>
  <text x="258" y="450" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Human phases</text>
  <rect x="360" y="440" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="378" y="450" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Agent phase</text>
  <rect x="470" y="440" width="12" height="12" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="488" y="450" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Iteration loop</text>
</svg>
